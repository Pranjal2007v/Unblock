name: My Workflow          # ① shown in the Actions tab

on:                        # ② when to run it
  push:
    branches: [main]       # on every push to main
  pull_request:            # and on every PR

jobs:
  build:                   # ③ a job named "build"
    runs-on: ubuntu-latest # ④ the machine/runner

    steps:
      - uses: actions/checkout@v4   # check out your code

      - name: Say hello             # a custom step
        run: echo "Hello, GitHub!"
