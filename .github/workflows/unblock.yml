name: DeepWiki Issue Bot

on:
  issues:
    types: [opened]

  issue_comment:
    types: [created]

jobs:
  answer-issue:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Answer issue with DeepWiki + Groq
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_NAME: apache/incubator-hugegraph
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isComment = context.eventName === 'issue_comment';

            if (isComment) {
              const commenter =
                context.payload.comment?.user?.login || '';

              if (commenter === 'github-actions[bot]') {
                console.log(
                  'Skipping bot comment to prevent loops'
                );
                return;
              }

              const commentBody =
                context.payload.comment?.body || '';

              const isQuoteReply = commentBody
                .trimStart()
                .startsWith('>');

              if (!isQuoteReply) {
                console.log(
                  'Skipping non quote-reply comment'
                );
                return;
              }

              const strippedBody = commentBody
                .split('\n')
                .filter(
                  line =>
                    !line.trimStart().startsWith('>')
                )
                .join('\n')
                .trim();

              if (!strippedBody) {
                console.log(
                  'Skipping empty quote reply'
                );
                return;
              }
            }

            const issueNumber = isComment
              ? context.payload.issue.number
              : context.issue.number;

            const issueTitle =
              context.payload.issue.title;

            const rawBody = isComment
              ? context.payload.comment.body
                  .split('\n')
                  .filter(
                    line =>
                      !line.trimStart().startsWith('>')
                  )
                  .join('\n')
                  .trim()
              : context.payload.issue.body || '';

            function cleanIssueBody(body) {
              return body
                .replace(
                  /##\s*(Environment|环境信息)[\s\S]*?(?=##|$)/gi,
                  ''
                )
                .replace(
                  /##\s*(Before submit|提交前确认)[\s\S]*?(?=##|$)/gi,
                  ''
                )
                .replace(
                  /##\s*(Schema|Vertex\/Edge example|问题点|元数据)[\s\S]*?(?=##|$)/gi,
                  ''
                )
                .replace(
                  /- \[[ x]\].*\n?/g,
                  ''
                )
                .replace(
                  /Server Version:.*\n?/g,
                  ''
                )
                .replace(
                  /Backend:.*\n?/g,
                  ''
                )
                .replace(
                  /OS:.*\n?/g,
                  ''
                )
                .replace(
                  /Data Size:.*\n?/g,
                  ''
                )
                .replace(
                  /N\/A.*\n?/gi,
                  ''
                )
                .replace(
                  /\n{3,}/g,
                  '\n\n'
                )
                .trim();
            }

            const issueBody =
              cleanIssueBody(rawBody);

            const repoName = process.env.REPO_NAME;

            console.log(
              `Processing issue #${issueNumber}`
            );

            console.log(
              'Cleaned issue preview:',
              issueBody.slice(0, 200)
            );

            async function fetchWithTimeout(
              url,
              options,
              timeoutMs = 35000
            ) {
              const controller =
                new AbortController();

              const timeout = setTimeout(
                () => controller.abort(),
                timeoutMs
              );

              try {
                return await fetch(url, {
                  ...options,
                  signal: controller.signal
                });
              } finally {
                clearTimeout(timeout);
              }
            }

            function parseMCPResponse(text) {
              const lines = text.split('\n');

              for (const line of lines) {
                if (line.startsWith(':')) {
                  continue;
                }

                if (!line.startsWith('data:')) {
                  continue;
                }

                const jsonStr =
                  line.slice(5).trim();

                if (
                  !jsonStr ||
                  jsonStr === '[DONE]'
                ) {
                  continue;
                }

                try {
                  const parsed =
                    JSON.parse(jsonStr);

                  if (
                    parsed.method &&
                    !parsed.id
                  ) {
                    continue;
                  }

                  if (
                    parsed.id !== undefined
                  ) {
                    return parsed;
                  }
                } catch (e) {
                  continue;
                }
              }

              try {
                return JSON.parse(text);
              } catch (e) {}

              throw new Error(
                'No valid JSON-RPC response found'
              );
            }

            async function askDeepWiki(question) {
              const url =
                'https://mcp.deepwiki.com/mcp';

              const baseHeaders = {
                'Content-Type':
                  'application/json',
                Accept:
                  'application/json, text/event-stream'
              };

              const initRes =
                await fetchWithTimeout(
                  url,
                  {
                    method: 'POST',
                    headers: baseHeaders,
                    body: JSON.stringify({
                      jsonrpc: '2.0',
                      id: 1,
                      method: 'initialize',
                      params: {
                        protocolVersion:
                          '2024-11-05',
                        capabilities: {},
                        clientInfo: {
                          name:
                            'deepwiki-bot',
                          version: '1.0.0'
                        }
                      }
                    })
                  }
                );

              const initText =
                await initRes.text();

              parseMCPResponse(initText);

              const sessionId =
                initRes.headers.get(
                  'mcp-session-id'
                );

              const headers = {
                ...baseHeaders
              };

              if (sessionId) {
                headers[
                  'mcp-session-id'
                ] = sessionId;
              }

              const toolRes =
                await fetchWithTimeout(
                  url,
                  {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                      jsonrpc: '2.0',
                      id: 2,
                      method: 'tools/call',
                      params: {
                        name: 'ask_question',
                        arguments: {
                          repoName,
                          question
                        }
                      }
                    })
                  },
                  45000
                );

              const toolText =
                await toolRes.text();

              console.log(
                'DeepWiki response preview:',
                toolText.slice(0, 300)
              );

              const toolData =
                parseMCPResponse(toolText);

              if (toolData.error) {
                throw new Error(
                  JSON.stringify(
                    toolData.error
                  )
                );
              }

              const content =
                toolData.result?.content ||
                [];

              return content
                .filter(
                  c => c.type === 'text'
                )
                .map(c => c.text)
                .join('\n');
            }

            async function callGroq(
              issueTitle,
              originalIssueBody,
              followUpQuestion,
              deepwikiContext,
              history = [],
              retries = 2
            ) {
              const messages = [
                {
                  role: 'system',
                  content: `You are a helpful GitHub bot for ${repoName}.`
                },
                {
                  role: 'user',
                  content: `
Issue Title:
${issueTitle}

Original Issue Description:
${originalIssueBody}
                  `
                },
                ...history,
                {
                  role: 'user',
                  content: followUpQuestion
                    ? `
Follow up question:
${followUpQuestion}

DeepWiki Context:
${deepwikiContext}

Write a helpful GitHub comment in markdown.
                      `
                    : `
Issue:
${issueTitle}

${originalIssueBody}

DeepWiki Context:
${deepwikiContext}

Write a helpful GitHub comment in markdown.
                      `
                }
              ];

              for (
                let attempt = 1;
                attempt <= retries;
                attempt++
              ) {
                try {
                  const response =
                    await fetchWithTimeout(
                      'https://api.groq.com/openai/v1/chat/completions',
                      {
                        method: 'POST',
                        headers: {
                          'Content-Type':
                            'application/json',
                          Authorization:
                            `Bearer ${process.env.OPENAI_API_KEY}`
                        },
                        body: JSON.stringify({
                          model:
                            'llama-3.3-70b-versatile',
                          messages,
                          max_tokens: 1024
                        })
                      },
                      20000
                    );

                  const data =
                    await response.json();

                  if (
                    response.status ===
                    429
                  ) {
                    const waitMs =
                      attempt * 5000;

                    console.warn(
                      `Rate limited. Retrying in ${waitMs}ms`
                    );

                    await new Promise(
                      resolve =>
                        setTimeout(
                          resolve,
                          waitMs
                        )
                    );

                    continue;
                  }

                  if (data.error) {
                    throw new Error(
                      JSON.stringify(
                        data.error
                      )
                    );
                  }

                  return (
                    data.choices?.[0]
                      ?.message?.content ||
                    'No response generated.'
                  );
                } catch (err) {
                  if (
                    attempt === retries
                  ) {
                    throw err;
                  }

                  console.warn(
                    `Groq retry ${attempt} failed: ${err.message}`
                  );

                  await new Promise(
                    resolve =>
                      setTimeout(
                        resolve,
                        3000
                      )
                  );
                }
              }
            }

            try {
              let originalIssueBody = issueBody;

              let conversationHistory =
                [];

              if (isComment) {
                const { data: issueData } =
                  await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber
                  });

                originalIssueBody =
                  cleanIssueBody(
                    issueData.body || ''
                  );

                const { data: comments } =
                  await github.rest.issues.listComments({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber
                  });

                conversationHistory =
                  comments.map(comment => ({
                    role:
                      comment.user.login ===
                      'github-actions[bot]'
                        ? 'assistant'
                        : 'user',
                    content: comment.body
                  }));
              }

              const question =
                `${issueTitle}\n\n${issueBody}`;

              const deepwikiContext =
                await askDeepWiki(question);

              console.log(
                'DeepWiki context length:',
                deepwikiContext.length
              );

              const answer =
                await callGroq(
                  issueTitle,
                  originalIssueBody,
                  isComment
                    ? issueBody
                    : '',
                  deepwikiContext,
                  conversationHistory
                );

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `${answer}

---
_AI generated using DeepWiki + Groq._
`
              });

              console.log(
                `Successfully answered issue #${issueNumber}`
              );
            } catch (err) {
              console.error(err);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `🤖 Bot failed with error:

\`${err.message}\``
              });

              core.setFailed(err.message);
            }
